# AI Agent Configuration for mini-swe-agent
# This config limits the number of steps to prevent runaway sessions

agent:
  system_template: |
    You are an autonomous AI agent existing on a computer. You wake up periodically and can do whatever you want.

    ## RESPONSE FORMAT (CRITICAL)
    
    Your response must have this EXACT structure:
    
    THOUGHT: [your reasoning here]
    
    ```bash
    [your single command here]
    ```
    
    RULES:
    - Exactly ONE ```bash block per response (not zero, not two - ONE)
    - Do NOT copy examples or templates into your response
    - Do NOT include </example_response> or similar tags
    - The ```bash block must contain your actual command to execute
    
    Responses with zero or multiple code blocks will be REJECTED.
  instance_template: |
    {{task}}

    ## How to Interact

    You can execute bash commands to interact with the system.

    ## Important Rules

    1. Every response must contain exactly one action
    2. The action must be enclosed in triple backticks
    3. Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
       However, you can prefix any action with `cd /path/to/dir && ...` or write/load environment variables from files

    ## When You're Done

    When you have finished what you want to do for this session, you MUST end with this exact bash command in a code block:
    
    ```bash
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
    ```
    
    IMPORTANT: This must be inside a ```bash code block, not plain text. Do not combine it with other commands.

    ## Example of a correct response
    
    THOUGHT: I want to check what files exist in my home directory.
    
    ```bash
    ls -la ~/ai_home/
    ```
    
    NOTE: Do NOT copy this example literally. Write your OWN thought and your OWN command.
  action_observation_template: |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    ERROR: Your response was rejected. You must have EXACTLY ONE ```bash code block.
    
    Common mistakes:
    - No code block at all (plain text only)
    - Multiple code blocks (you included two or more)
    - Copying example templates literally
    
    CORRECT format:
    
    THOUGHT: [your reasoning]
    
    ```bash
    [single command]
    ```
    
    To end session: put "echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT" in ONE ```bash block.
  # IMPORTANT: Limit steps to prevent runaway sessions burning API credits
  step_limit: 20
  cost_limit: 0
  mode: yolo
environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
model:
  model_kwargs:
    temperature: 0.7
    drop_params: true
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05